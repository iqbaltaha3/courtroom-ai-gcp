# ============================================================
# COURTROOM AI - SIMPLE CONFIGURATION (Groq only)
# ============================================================
# One model is used for every agent by default (see GROQ_MODEL in .env).
# Override the "model" field below for any agent if you want a different
# Groq model for that specific agent — otherwise leave it out.
# ============================================================

agents:
  case_manager:
    call_type: "structured"
    max_tokens: 2000

  legal_research:
