    max_tokens: 2000

  prosecutor_r1:
    call_type: "prose"
    max_tokens: 1500

  prosecutor_r2:
    call_type: "prose"
    max_tokens: 1500

  defense_r1:
    call_type: "prose"
    max_tokens: 1500

  defense_r2:
    call_type: "prose"
    max_tokens: 1500

  judge:
    call_type: "structured"
    max_tokens: 2000

  reporter:
    call_type: "prose"
    max_tokens: 1500
